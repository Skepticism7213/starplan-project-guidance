# StarPlan Loop Skills Definition
# Version: 0.1.0
# Date: 2026-07-19

project:
  name: "StarPlan Loop"
  version: "0.1.0"
  description: "面向 AI 的校园天文观测与科普实训闭环 Skills 包"

skills:
  - name: target_resolve
    description: "将中文名、英文名或别名解析为标准目标、坐标、类型和置信度"
    trigger: "用户输入观测目标后，作为第一个被调用的 Skill"
    input:
      schema: TargetResolveInput
      fields:
        - name: target_name
          type: string
          required: true
          description: "目标名称（中文/英文/Messier/NGC）"
        - name: target_type
          type: string
          required: false
          description: "可选类型提示：deep_sky, star, planet, asterism"
    output:
      schema: ResolvedTarget
    failure_handling:
      - "名称无匹配 → 返回错误提示 + 建议检查拼写"
      - "名称歧义 → 返回候选列表 + requires_confirmation=true"
      - "输入为空 → 返回缺失字段提示"
    human_confirmation:
      - "名称歧义时必须要求人工选择"

  - name: observability_plan
    description: "根据目标坐标、地点、日期和设备计算可观测性并生成计划"
    trigger: "target_resolve 成功返回坐标后"
    input:
      schema: StarPlanInput
      fields:
        - name: ra_deg
          type: float
          required: true
        - name: dec_deg
          type: float
          required: true
        - name: target_name
          type: string
          required: true
        - name: location
          type: LocationDetail
          required: true
        - name: date_range
          type: list[date]
          required: true
        - name: equipment
          type: string
          required: false
        - name: constraints
          type: ObservingConstraint
          required: false
    output:
      schema: ObservabilityResult
    failure_handling:
      - "地点/时区/日期不完整 → 停止计算 + 返回缺失项"
      - "目标整晚不可见 → is_observable=false + 原因 + 备选建议"
      - "工具异常 → 捕获 + 记录 manifest + 返回错误"
    human_confirmation:
      - "地点解析到多个候选时"
      - "推荐窗口风险等级为高时"

  - name: outreach_pack
    description: "将确定性计算结果转化为面向目标受众的科普活动包"
    trigger: "observability_plan 成功生成计划后"
    input:
      schema: OutreachPackInput
      fields:
        - name: fact_cards
          type: list[FactCard]
          required: true
        - name: calculation_results
          type: ObservabilityResult
          required: true
        - name: audience
          type: string
          required: true
        - name: equipment
          type: string
          required: true
    output:
      schema: OutreachPack
    failure_handling:
      - "事实卡不完整 → unconfirmed_items 标记 + 不补写数值"
      - "Qwen 生成无法追溯的数值 → 验证层拦截"
      - "受众类型未知 → 回退通用模板"
    human_confirmation:
      - "科普稿引用未验证事实时"
      - "系统准备替换主目标时"

  - name: observation_review
    description: "对比计划和实际日志，生成偏差分析和修订计划"
    trigger: "用户导入实际观测日志后"
    input:
      schema: ObservationReviewInput
      fields:
        - name: original_plan
          type: ObservabilityResult
          required: true
        - name: observation_log
          type: ObservationLog
          required: true
    output:
      schema: ObservationReview
    failure_handling:
      - "日志字段缺失 → 返回缺失清单 + 标记不可比较项"
      - "原计划不存在 → 返回明确错误"
      - "信息不足 → classification=undetermined"
    human_confirmation:
      - "复盘原因只有弱证据时"
      - "系统准备替换下次活动主目标时"

orchestrator:
  entry: starplan.run
  description: "总控入口：识别意图 → 调用 Skill → 保存运行目录 → 返回结果"
  output_directory: "runs/case_{run_id}/"
